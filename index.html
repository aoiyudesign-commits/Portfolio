<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Product Analyst — 29CM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ── */
    :root {
      --primary:   #0075de;
      --orange:    #FF6000;
      --ink:       #0a0a0a;
      --ink-2:     #444;
      --ink-3:     #888;
      --ink-4:     #bbb;
      --hairline:  #e6e6e6;
      --surface:   #ffffff;
      --r-md: 10px; --r-lg: 16px; --r-xl: 20px; --r-full: 9999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px; height: 100vh; overflow: hidden;
      /* Soft mesh background — makes glassmorphism readable */
      background-color: #e8ecf5;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 15%, rgba(140,160,255,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 85% 20%, rgba(200,140,255,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 90% 70% at 50% 90%, rgba(100,180,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,140,100,0.10) 0%, transparent 50%);
    }

    /* ══════════════════════════════
       LANDING
    ══════════════════════════════ */
    .landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 32px;
      transition: opacity 0.38s ease, transform 0.38s ease, filter 0.38s ease;
    }
    .landing.out { opacity: 0; transform: scale(0.97) translateY(-6px); filter: blur(4px); pointer-events: none; }

    /* Badge */
    .lv-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.65); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: var(--r-full); padding: 5px 14px 5px 5px;
      font-size: 12px; font-weight: 500; color: #555;
      margin-bottom: 28px; cursor: default;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .lv-badge-icon {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--orange); display: flex; align-items: center; justify-content: center;
    }

    /* Hero */
    .lv-h1 {
      font-size: 42px; font-weight: 800; letter-spacing: -2px; color: var(--ink);
      line-height: 1.12; margin-bottom: 14px; text-align: center;
      text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    }
    .lv-sub {
      font-size: 15px; color: #555; line-height: 1.65;
      text-align: center; max-width: 440px; margin-bottom: 44px;
    }

    /* ── Cards grid ── */
    .lv-cards { display: grid; grid-template-columns: repeat(3, 240px); gap: 14px; margin-bottom: 36px; }

    /* Glass card */
    .lv-card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: var(--r-xl);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -1px 0 rgba(0,0,0,0.03),
        0 2px 4px rgba(0,0,0,0.03),
        0 6px 20px rgba(0,0,0,0.07),
        0 20px 48px rgba(0,0,0,0.07);
      overflow: hidden; cursor: pointer;
      transform: translateY(0px);
      transition: box-shadow 0.25s ease, transform 0.3s ease;
      will-change: transform;
    }
    .lv-card:hover {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -1px 0 rgba(0,0,0,0.03),
        0 4px 12px rgba(0,0,0,0.06),
        0 16px 48px rgba(0,0,0,0.12),
        0 36px 80px rgba(0,0,0,0.09);
    }

    /* Wobble keyframe — starts at lifted position */
    @keyframes wobble {
      0%   { transform: translateY(0)    rotate(0deg);    }
      12%  { transform: translateY(-9px) rotate(-2.5deg); }
      24%  { transform: translateY(-9px) rotate(2.5deg);  }
      36%  { transform: translateY(-7px) rotate(-1.6deg); }
      48%  { transform: translateY(-7px) rotate(1.2deg);  }
      60%  { transform: translateY(-6px) rotate(-0.8deg); }
      72%  { transform: translateY(-6px) rotate(0.4deg);  }
      84%  { transform: translateY(-5px) rotate(-0.2deg); }
      100% { transform: translateY(-5px) rotate(0deg);    }
    }
    .lv-card.wobble { animation: wobble 0.52s cubic-bezier(0.36,0.07,0.19,0.97); }

    /* Card content — Medusa style: label on top, art below */
    .card-label {
      padding: 15px 16px 10px;
      font-size: 13px; font-weight: 600; color: var(--ink-2);
      letter-spacing: -0.1px;
    }
    .card-art {
      margin: 0 10px 10px; border-radius: 12px; overflow: hidden;
      height: 200px; display: flex; align-items: center; justify-content: center;
      background: rgba(248,248,246,0.8);
      border: 1px solid rgba(0,0,0,0.055);
      position: relative;
    }

    /* Footer hint */
    .lv-hint { font-size: 12px; color: rgba(0,0,0,0.35); display: flex; align-items: center; gap: 7px; }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 5px;
      background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.12); border-radius: 5px;
      font-size: 11px; font-weight: 600; color: #444;
    }

  </style>
</head>
<body>

<script>
/* 카드 클릭 → 페이지 이동 (fade out 후 navigate) */
function go(href) {
  document.getElementById('landing').classList.add('out');
  setTimeout(() => window.location.href = href, 260);
}

/* Wobble on hover */
document.querySelectorAll('.lv-card').forEach(card => {
  card.addEventListener('mouseenter', () => {
    card.classList.remove('wobble');
    void card.offsetWidth;
    card.classList.add('wobble');
  });
  card.addEventListener('animationend', () => card.classList.remove('wobble'));
  card.addEventListener('mouseleave', () => card.classList.remove('wobble'));
});

/* Keyboard shortcuts */
document.addEventListener('keydown', e => {
  if (e.key==='d'||e.key==='D') go('pages/dashboard.html');
  if (e.key==='c'||e.key==='C') go('pages/canvas.html');
  if (e.key==='r'||e.key==='R') go('pages/report.html');
});
</script>
</body>
